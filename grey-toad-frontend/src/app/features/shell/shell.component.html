<div class="shell" [class.collapsed]="sidebarCollapsed">
  <div class="mobile-backdrop" (click)="sidebarCollapsed = true"></div>

  <!-- Always-visible sidebar toggle tab -->
  <button class="sidebar-toggle-tab" (click)="sidebarCollapsed = !sidebarCollapsed" [title]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">GT</span>
      <span class="brand-name" *ngIf="!sidebarCollapsed">Grey Toad</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems" [routerLink]="item.path" class="nav-item" [class.active]="isActive(item.path)" [title]="sidebarCollapsed ? item.label : ''">
        <span class="nav-icon">
          <svg *ngIf="item.icon==='grid'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <svg *ngIf="item.icon==='users'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <svg *ngIf="item.icon==='folder'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <svg *ngIf="item.icon==='check-square'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <svg *ngIf="item.icon==='hash'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          <svg *ngIf="item.icon==='message-circle'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <svg *ngIf="item.icon==='user'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <svg *ngIf="item.icon==='shield'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <!-- Theme toggle -->
      <button class="theme-toggle-btn" (click)="toggleTheme()" [title]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg *ngIf="isDarkMode" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg *ngIf="!isDarkMode" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span *ngIf="!sidebarCollapsed">{{ isDarkMode ? 'Dark mode' : 'Light mode' }}</span>
      </button>

      <div class="user-info" *ngIf="user" [routerLink]="['/profile']" style="cursor:pointer">
        <div class="avatar-wrapper">
          <div class="avatar">{{ getInitials(user.username) }}</div>
          <span class="status-dot-sidebar" [style.background]="getStatusColor(user.status)"></span>
        </div>
        <div class="user-details" *ngIf="!sidebarCollapsed">
          <span class="user-name">{{ user.username }}</span>
          <span class="user-role-label" [class.rainbow]="user?.role === 'ADMIN' || false">{{ roleLabel }}</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm logout-btn" (click)="logout()" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span *ngIf="!sidebarCollapsed">Sign out</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Bell — fixed top-right overlay -->
<div class="bell-overlay">
  <button class="bell-overlay-btn" (click)="toggleBell()" title="Powiadomienia">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="bell-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
  </button>

  <div class="notif-panel" *ngIf="bellOpen">
    <div class="notif-panel-header">
      <span>Powiadomienia</span>
      <button class="notif-clear" (click)="clearNotifications()">Wyczyść</button>
    </div>
    <div class="notif-empty" *ngIf="notifications.length === 0">Brak nowych powiadomień</div>
    <div class="notif-item" *ngFor="let n of notifications">
      <!-- task assigned -->
      <svg *ngIf="n.type === 'TASK_ASSIGNED'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4a9a6a" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <!-- dm -->
      <svg *ngIf="n.type === 'DM'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7aaac0" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <!-- channel -->
      <svg *ngIf="n.type === 'CHANNEL_MESSAGE'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a07ac0" stroke-width="2" stroke-linecap="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
      <div class="notif-item-body">
        <span class="notif-item-label">{{ n.title }}</span>
        <span class="notif-item-title">{{ n.body }}</span>
      </div>
    </div>
  </div>
</div>
